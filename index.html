<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f6f8;color:#222;min-height:100vh}
:root{--t:#2a9d8f;--td:#1f7569;--tl:#e0f4f2;--bd:#d0e8e5}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:24px}
.auth-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.10)}
.auth-title{font-size:30px;font-weight:700;text-align:center;margin-bottom:28px;color:#111}
.auth-field{display:block;width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:13px 16px;font-size:15px;margin-bottom:14px;outline:none;color:#222;background:#fff;transition:.15s}
.auth-field:focus{border-color:var(--t);box-shadow:0 0 0 3px rgba(42,157,143,.12)}
.auth-field::placeholder{color:#aab}
.auth-btn{display:block;width:100%;border:2px solid var(--t);border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;background:#fff;color:var(--t);transition:.15s;text-align:center}
.auth-btn:hover{background:var(--tl)}
.auth-msg{text-align:center;font-size:13px;margin-top:10px;min-height:20px;font-weight:600}
.auth-msg.err{color:#c0392b}.auth-msg.ok{color:var(--t)}
.topbar{background:var(--t);color:#fff;padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar-title{font-size:17px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:10px;font-size:13px}
.topbar button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
.topbar button:hover{background:rgba(255,255,255,.35)}
.navtabs{background:#fff;border-bottom:3px solid var(--tl);display:flex;overflow-x:auto;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.navtab{padding:13px 18px;font-size:13px;font-weight:700;cursor:pointer;color:#888;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-3px;transition:.13s}
.navtab.on{color:var(--t);border-bottom-color:var(--t)}
.subtabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.stab{font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--bd);border-radius:8px;padding:7px 12px;background:#fff;color:#888;transition:.13s;white-space:nowrap}
.stab.on{background:var(--t);color:#fff;border-color:var(--t)}
.content{max-width:920px;margin:0 auto;padding:18px 16px 80px}
.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);border:1px solid #eef2f0}
.card-title{font-size:15px;font-weight:700;margin-bottom:10px;color:#111}
.sect{font-size:11.5px;font-weight:800;color:var(--t);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
.grp-block{border-radius:10px;overflow:hidden;margin-bottom:12px;border:1px solid #e2eeec}
.grp-hdr{background:var(--t);color:#fff;padding:9px 14px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.grp-sub{font-size:11px;font-weight:400;opacity:.88}
.match-row{display:grid;grid-template-columns:48px 1fr auto 1fr;gap:6px;align-items:center;padding:8px 12px;border-bottom:1px solid #eef2f0;background:#fff}
.match-row:last-child{border:none}
.match-date{font-size:10px;color:#999;text-align:center;font-weight:700;line-height:1.3}
.th{text-align:right;font-size:13px;font-weight:700}
.ta{text-align:left;font-size:13px;font-weight:700}
.sbox{display:flex;align-items:center;gap:5px;justify-content:center}
.sin{width:44px;text-align:center;font-weight:800;font-size:15px;padding:5px 2px;border:1.5px solid #ccc;border-radius:7px;background:#fff;color:#222}
.sin:focus{border-color:var(--t);outline:none}
.sin.pend{background:#f8f8f8;color:#bbb}
.sdash{color:#bbb;font-weight:800}
.pend-label{font-size:11px;color:#bbb;font-style:italic;text-align:center}
.winner-sel{font-size:11px;padding:4px 8px;border:1.5px solid var(--bd);border-radius:6px;background:#fff;cursor:pointer;margin-left:4px}
.winner-sel:focus{border-color:var(--t);outline:none}
.std-mini{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.std-mini th{background:#f4f6f8;padding:4px 6px;font-weight:700;color:#888;text-align:right}
.std-mini th:first-child{text-align:left}
.std-mini td{padding:4px 6px;border-bottom:1px solid #f0f0f0;text-align:right}
.std-mini td:first-child{text-align:left;font-weight:700}
.std-mini .p1{background:#e8f5e9}.std-mini .p2{background:#e3f2fd}.std-mini .p3{background:#fff8e1}
.lb-table{width:100%;border-collapse:collapse;font-size:13px}
.lb-table th{background:var(--t);color:#fff;padding:10px 12px;text-align:left;font-weight:700}
.lb-table th:not(:first-child){text-align:right}
.lb-table td{padding:10px 12px;border-bottom:1px solid #eef2f0;vertical-align:middle}
.lb-table td:not(:first-child){text-align:right}
.lb-table tr:hover td{background:#f8fdfc}
.lb-gold td{background:#fffde7}.lb-silver td{background:#fafafa}.lb-bronze td{background:#fff5f0}
.lb-total{font-size:19px;font-weight:800;color:var(--t)}
.ko-badge{font-size:10px;background:var(--tl);color:var(--td);border-radius:4px;padding:2px 7px;font-weight:700;margin-left:6px}
.pts-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid #eef2f0;border-radius:10px;margin-bottom:8px;background:#fff}
.pts-num{font-size:26px;font-weight:800;color:var(--t);min-width:52px;text-align:center}
.pts-info strong{font-size:13px;display:block;color:#222}
.pts-info span{font-size:12px;color:#888}
.btn{font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--t);border-radius:8px;padding:9px 18px;background:#fff;color:var(--t);transition:.13s}
.btn:hover{background:var(--tl)}
.btn.solid{background:var(--t);color:#fff;border-color:var(--t)}
.btn.solid:hover{background:var(--td)}
.btn.red{border-color:#c0392b;color:#c0392b}
.btn.red:hover{background:#fdecea}
.btn.gray{border-color:#aaa;color:#666}
.btn.gray:hover{background:#f4f4f4}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.field-group{margin-bottom:12px}
.field-lbl{font-size:12px;color:#888;font-weight:700;margin-bottom:4px}
.field-in{display:block;width:100%;border:1.5px solid #ddd;border-radius:8px;padding:9px 12px;font-size:14px;color:#222;background:#fff;outline:none}
.field-in:focus{border-color:var(--t)}
.notice{background:var(--tl);border:1px solid var(--t);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--td);margin-bottom:12px;font-weight:600}
.warn{background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:11px 14px;font-size:13px;color:#856404;margin-bottom:12px;font-weight:600}
.my-match{display:grid;grid-template-columns:48px 1fr auto 1fr 72px;gap:5px;align-items:center;padding:7px 10px;border-bottom:1px solid #eef2f0;font-size:13px}
.save-indicator{font-size:11px;color:rgba(255,255,255,.75);margin-left:8px}
.lock-tag{background:rgba(255,255,255,.25);color:#fff;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:800}
.cfg-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cfg-lbl{flex:1;font-size:13px;color:#444}
.ko-sel{font-size:12px;padding:5px 8px;border:1.5px solid #ccc;border-radius:7px;background:#fff;cursor:pointer;color:#222;min-width:120px}
.ko-sel:focus{border-color:var(--t);outline:none}
.setup-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:24px}
.setup-box{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:520px;box-shadow:0 4px 24px rgba(0,0,0,.10)}
.step{background:#f8fdfc;border:1px solid var(--tl);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.step-n{font-size:11px;font-weight:800;color:var(--t);margin-bottom:4px}
.step-t{font-size:13px;color:#444;line-height:1.6}
.step-t a{color:var(--t);font-weight:700}
@media(max-width:600px){
  .match-row{grid-template-columns:40px 1fr auto 1fr}
  .my-match{grid-template-columns:40px 1fr auto 1fr 60px;font-size:12px}
  .auth-box{padding:28px 18px}
}

// ══ FIFA ENGINE ══
function calcGrp(g,sc){
  var rows={};
  GRP[g].forEach(function(t){rows[t]={t:t,pts:0,gf:0,ga:0,gd:0,w:0,d:0,l:0,pl:0};});
  MS.filter(function(m){return m.g===g;}).forEach(function(m){
    var r=sc[m.id]; if(!r||r.h===''||r.h==null||r.a===''||r.a==null)return;
    var hg=+r.h,ag=+r.a;
    rows[m.h].gf+=hg;rows[m.h].ga+=ag;rows[m.h].pl++;
    rows[m.a].gf+=ag;rows[m.a].ga+=hg;rows[m.a].pl++;
    if(hg>ag){rows[m.h].pts+=3;rows[m.h].w++;rows[m.a].l++;}
    else if(hg<ag){rows[m.a].pts+=3;rows[m.a].w++;rows[m.h].l++;}
    else{rows[m.h].pts++;rows[m.h].d++;rows[m.a].pts++;rows[m.a].d++;}
  });
  Object.values(rows).forEach(function(r){r.gd=r.gf-r.ga;});
  return Object.values(rows).sort(function(a,b){return (b.pts-a.pts)||(b.gd-a.gd)||(b.gf-a.gf);});
}
function allStd(sc){var r={};Object.keys(GRP).forEach(function(g){r[g]=calcGrp(g,sc);});return r;}
function bestThirds(std){
  return Object.entries(std).map(function(e){return Object.assign({},e[1][2],{grp:e[0]});})
    .filter(function(x){return x&&x.t;})
    .sort(function(a,b){return (b.pts-a.pts)||(b.gd-a.gd)||(b.gf-a.gf);})
    .slice(0,8);
}
function assignThirds(thirds){
  var map={},used=new Set();
  thirds.forEach(function(th){
    for(var i=0;i<TSLOTS.length;i++){
      var sl=TSLOTS[i];
      if(!used.has(sl.n)&&sl.pool.indexOf(th.grp)>=0){map[sl.n]=th.t;used.add(sl.n);break;}
    }
  });
  return map;
}
function out(x){return x>0?1:x<0?-1:0;}

// Resolve participant's own bracket from their score predictions
// pKw: {matchN: teamName} for KO tiebreakers when participant predicts draw
function resolveParticipantBracket(pSc,pKw){
  var std=allStd(pSc);
  var thirds=bestThirds(std);
  var tm=assignThirds(thirds);
  var br={};
  var gp=function(l){
    var m=l.match(/^([12])\.º ([A-L])$/);
    if(!m)return null;
    // SOLO devolver equipo si el grupo tiene al menos un marcador ingresado
    var g=m[2];
    var hasScore=MS.filter(function(mm){return mm.g===g;}).some(function(mm){
      var r=pSc[mm.id];return r&&r.h!==''&&r.h!=null&&r.a!==''&&r.a!=null;
    });
    if(!hasScore)return null;
    var tbl=std[m[2]];
    return tbl&&tbl[parseInt(m[1])-1]?tbl[parseInt(m[1])-1].t:null;
  };
  R32.forEach(function(m){
    var rh=/^[12]\.º [A-L]$/.test(m.h)?gp(m.h):m.h;
    var ra=m.a.indexOf('3.')===0?(tm[m.n]||null):(/^[12]\.º [A-L]$/.test(m.a)?gp(m.a):m.a);
    br[m.n]={h:rh||null,a:ra||null};
  });
  function getWin(n){
    var teams=br[n],r=pSc[n];
    if(!teams||!teams.h||!teams.a)return null;
    if(pKw&&pKw[n])return pKw[n];
    if(!r||r.h===''||r.h==null||r.a===''||r.a==null)return null;
    var h=+r.h,a=+r.a;
    if(h>a)return teams.h;
    if(h<a)return teams.a;
    return null;
  }
  function getLose(n){
    var w=getWin(n),teams=br[n];
    if(!w||!teams)return null;
    return teams.h===w?teams.a:teams.h;
  }
  function gt(l){
    var m1=l.match(/^G\.P(\d+)$/);
    if(m1)return getWin(parseInt(m1[1]));
    var m2=l.match(/^Per\.P(\d+)$/);
    if(m2)return getLose(parseInt(m2[1]));
    return null;
  }
  [].concat(OCT,QF,SF,TP,FIN).forEach(function(m){
    br[m.n]={h:gt(m.h),a:gt(m.a)};
  });
  return {br:br,getWin:getWin,getLose:getLose,std:std,thirds:thirds};
}

// Derive quals from participant's predictions
// SOLO cuenta equipos de grupos donde el participante ingresó al menos 1 marcador
function deriveParticipantQuals(pSc,pKw){
  var res=resolveParticipantBracket(pSc,pKw);
  var std=res.std,getWin=res.getWin;
  var r32=[];
  var thirdCandidates=[];
  Object.keys(GRP).forEach(function(g){
    // Verificar si hay algún marcador en este grupo
    var hasScore=MS.filter(function(m){return m.g===g;}).some(function(m){
      var r=pSc[m.id];return r&&r.h!==''&&r.h!=null&&r.a!==''&&r.a!=null;
    });
    if(!hasScore)return; // Grupo vacío → no suma clasificados
    var tbl=std[g]||[];
    if(tbl[0]&&tbl[0].t)r32.push(tbl[0].t);
    if(tbl[1]&&tbl[1].t)r32.push(tbl[1].t);
    if(tbl[2]&&tbl[2].t)thirdCandidates.push(Object.assign({},tbl[2],{grp:g}));
  });
  // Mejores 8 terceros (solo de grupos con marcadores)
  thirdCandidates.sort(function(a,b){return (b.pts-a.pts)||(b.gd-a.gd)||(b.gf-a.gf);});
  thirdCandidates.slice(0,8).forEach(function(x){if(x&&x.t)r32.push(x.t);});
  var ko=function(a,b){return Array.from({length:b-a+1},function(_,i){return getWin(a+i);}).filter(Boolean);};
  return {
    r32:r32,r16:ko(73,88),qf:ko(89,96),sf:ko(97,100),
    tp:[getWin(103)].filter(Boolean),
    fin:[getWin(101),getWin(102)].filter(Boolean),
    champ:getWin(104)?[getWin(104)]:[]
  };
}

// Official bracket resolution (uses official kw for draws)
function resolveBracket(std,thirds,kw){
  var tm=assignThirds(thirds),res={};
  var gp=function(l){var m=l.match(/^([12])\.º ([A-L])$/);return m?(std[m[2]]&&std[m[2]][parseInt(m[1])-1]?std[m[2]][parseInt(m[1])-1].t:null):null;};
  R32.forEach(function(m){
    // Si ya tiene nombre real (no formato "X.º G"), usarlo directamente
    var rh=/^[12]\.º [A-L]$/.test(m.h)?gp(m.h):m.h;
    var ra=m.a.indexOf('3.')===0?(tm[m.n]||null):(/^[12]\.º [A-L]$/.test(m.a)?gp(m.a):m.a);
    res[m.n]={h:rh||null,a:ra||null};
  });
  function getW(n){
    var r=res[n],sc=D.official.scores[n];
    if(kw[n])return kw[n];
    if(!r||!sc||sc.h===''||sc.h==null||sc.a===''||sc.a==null)return null;
    var h=+sc.h,a=+sc.a;
    if(h>a)return r.h;if(h<a)return r.a;return null;
  }
  function getL(n){var w=getW(n),r=res[n];if(!w||!r)return null;return r.h===w?r.a:r.h;}
  function gt(l){var m1=l.match(/^G\.P(\d+)$/);if(m1)return getW(parseInt(m1[1]));var m2=l.match(/^Per\.P(\d+)$/);if(m2)return getL(parseInt(m2[1]));return null;}
  [].concat(OCT,QF,SF,TP,FIN).forEach(function(m){res[m.n]={h:gt(m.h),a:gt(m.a)};});
  return res;
}
function deriveOfficialQuals(std,thirds,kw,sc){
  var r32=[];
  Object.values(std).forEach(function(t){if(t[0]&&t[0].t)r32.push(t[0].t);if(t[1]&&t[1].t)r32.push(t[1].t);});
  thirds.forEach(function(x){if(x&&x.t)r32.push(x.t);});
  var ko=function(a,b){
    var br=resolveBracket(std,thirds,kw);
    return Array.from({length:b-a+1},function(_,i){
      var n=a+i;
      if(kw[n])return kw[n];
      var r=br[n],s=sc[n];
      if(!r||!s||s.h===''||s.h==null||s.a===''||s.a==null)return null;
      var h=+s.h,a2=+s.a;
      if(h>a2)return r.h;if(h<a2)return r.a;return null;
    }).filter(Boolean);
  };
  return {r32:r32,r16:ko(73,88),qf:ko(89,96),sf:ko(97,100),tp:ko(103,103),fin:[kw[101]||null,kw[102]||null].filter(Boolean),champ:kw[104]?[kw[104]]:[]};
}

// ══ SCORING ══
function calcPts(pred,sc,kw,cfg,oq){
  if(!pred)return {sc:0,q:0,tot:0,byPhase:{}};
  var pSc=pred.scores||{},pKw=pred.koWinners||{};
  var scPts=0;
  // Group matches 1-72
  MS.forEach(function(m){
    var p=pSc[m.id],o=sc[m.id];
    if(!p||p.h===''||p.h==null||p.a===''||p.a==null)return;
    if(!o||o.h===''||o.h==null||o.a===''||o.a==null)return;
    var ph=+p.h,pa=+p.a,oh=+o.h,oa=+o.a;
    if(ph===oh&&pa===oa){scPts+=cfg.result+cfg.exact;return;}  // 2+3=5 máximo
    if(out(ph-pa)===out(oh-oa))scPts+=cfg.result;              // solo 2
  });
  // KO matches 73-104
  // Para R32: usar R32_TEAMS (equipos reales directos, sin depender de std/gp)
  // Para OCT+: usar resolveBracket con kw
  var oStd2=allStd(sc),oThirds2=bestThirds(oStd2),oBr2=resolveBracket(oStd2,oThirds2,kw);
  [].concat(R32,OCT,QF,SF,TP,FIN).forEach(function(m){
    var _mn=String(m.n);var p=pSc[_mn]||pSc[m.n],o=sc[_mn]||sc[m.n];
    // Obtener equipos: prioridad a R32_TEAMS para 16avos, luego bracket resuelto
    var oTeams=R32_TEAMS[m.n]||oBr2[m.n]||null;
    if(!oTeams||!oTeams.h||!oTeams.a)return; // equipos aún no definidos
    // Resultado oficial: primero kw (desempate admin), luego marcador
    var offWin=kw[m.n]||kw[String(m.n)]||(function(){
      if(!o||o.h===''||o.h==null||o.a===''||o.a==null)return null;
      var h=+o.h,a=+o.a;
      if(h>a)return oTeams.h;
      if(h<a)return oTeams.a;
      return null; // empate en grupos va a kw
    })();
    if(!offWin)return; // partido sin resultado oficial aún
    // Ganador predicho por el participante
    var predWin=pKw[m.n]||pKw[String(m.n)]||(function(){
      if(!p||p.h===''||p.h==null||p.a===''||p.a==null)return null;
      var h=+p.h,a=+p.a;
      if(h>a)return oTeams.h;
      if(h<a)return oTeams.a;
      return null;
    })();
    if(!predWin)return; // participante no predijo este partido
    // Puntaje: marcador exacto + ganador = 5pts, solo ganador = 2pts
    if(o&&o.h!==''&&o.h!=null&&o.a!==''&&o.a!=null&&
       p&&p.h!==''&&p.h!=null&&p.a!==''&&p.a!=null){
      var ph=+p.h,pa=+p.a,oh=+o.h,oa=+o.a;
      if(ph===oh&&pa===oa&&predWin===offWin){scPts+=cfg.result+cfg.exact;return;}
    }
    if(predWin===offWin)scPts+=cfg.result;
  });
  // Qualifier points from participant's auto-derived quals
  var predQuals=deriveParticipantQuals(pSc,pKw);
  var q=0,byPhase={};
  PHASES.forEach(function(ph){
    var off=oq[ph.k]||[],mine=predQuals[ph.k]||[],pv=cfg[ph.ptk]||0;
    var got=mine.filter(function(t){return off.indexOf(t)>=0;}).length*pv;
    byPhase[ph.k]=got;q+=got;
  });
  return {sc:scPts,q:q,tot:scPts+q,byPhase:byPhase};
}

function doLogin(){
  var u=(document.getElementById('aUser').value||'').trim().toLowerCase();
  var p=document.getElementById('aPass').value||'';
  if(!u||!p){setAuthMsg('Completa usuario y contraseña.');return;}
  if(u==='admin'&&p===D.config.adminPass){me={id:'admin',name:'Organizador',username:'admin',role:'admin'};authMsg='';render();return;}
  var usr=D.users.find(function(x){return x.username.toLowerCase()===u;});
  if(!usr||usr.password!==p){setAuthMsg('Usuario o contraseña incorrectos.');return;}
  me=usr;authMsg='';render();
}
function doRegister(){
  var name=(document.getElementById('rName').value||'').trim();
  var usr=(document.getElementById('rUser').value||'').trim().toLowerCase();
  var p=document.getElementById('rPass').value||'';
  var p2=document.getElementById('rPass2').value||'';
  if(!name||!usr||!p||!p2){setAuthMsg('Completa todos los campos.');return;}
  if(/\s/.test(usr)){setAuthMsg('El usuario no puede tener espacios.');return;}
  if(p!==p2){setAuthMsg('Las contraseñas no coinciden.');return;}
  if(p.length<4){setAuthMsg('Mínimo 4 caracteres en la contraseña.');return;}
  if(D.users.find(function(x){return x.username.toLowerCase()===usr;})){setAuthMsg('Ese usuario ya existe.');return;}
  var nu={id:'u'+Date.now(),name:name,username:usr,password:p,role:'player',locked:false};
  persist(function(d){d.users.push(nu);return d;}).then(function(){me=nu;authMsg='';render();});
}
function doRecover(){
  var u=(document.getElementById('recUser').value||'').trim().toLowerCase();
  if(!u){setAuthMsg('Escribe tu nombre de usuario.');return;}
  var usr=D.users.find(function(x){return x.username.toLowerCase()===u;});
  if(!usr){setAuthMsg('No encontramos ese usuario.');return;}
  persist(function(d){d.recovery=d.recovery||[];if(!d.recovery.find(function(x){return x.uid===usr.id;}))d.recovery.push({uid:usr.id,name:usr.name,username:usr.username,ts:Date.now()});return d;})
    .then(function(){setAuthMsg('Solicitud enviada. El organizador te contactará pronto.','ok');});
}

function renderPronosKO(ms,pSc,pKw,roundKey){

    var teams=oBr[m.n]||{h:null,a:null};
    var r=lSc[m.n]||{h:'',a:''};
    var predW=getPredWin(m.n);
    var hReady=!!teams.h,aReady=!!teams.a;
    var both=hReady&&aReady;
    var homePending=m.hl||m.h, awayPending=m.al||m.a;

      :'<span style="color:#999;font-style:italic;font-size:12px">'+awayPending+'</span>';

    // Inputs de marcador (predicción del participante, intactos)
    var scoreH='<input class="sin'+(both?' pred-sc':' pend')+'" data-mid="'+m.n+'" data-side="h" type="number" min="0"'+(!both?' disabled':'')+' value="'+(r.h!==''&&r.h!=null?r.h:'')+'">';
    var scoreA='<input class="sin'+(both?' pred-sc':' pend')+'" data-mid="'+m.n+'" data-side="a" type="number" min="0"'+(!both?' disabled':'')+' value="'+(r.a!==''&&r.a!=null?r.a:'')+'">';

    // Selector de ganador con equipos oficiales
    var winSel='';
    if(both){

function renderLockedPronos(pred,sc,kw,cfg,oq,pts,pSc,pKw){
  var pRes=resolveParticipantBracket(pSc,pKw);
  var pGetWin=pRes.getWin;
  var oStd=allStd(sc),oThirds=bestThirds(oStd),oBr=resolveBracket(oStd,oThirds,kw);
  var allMatchRows=function(ms,isKO){
    return ms.map(function(m){
      var mid=isKO?m.n:m.id;
      var p=pSc[mid],o=sc[mid];
      if(!p||p.h===''||p.h==null)return null;
      var hasOff=o&&o.h!==''&&o.h!=null&&o.a!==''&&o.a!=null;
      var predWin=isKO?pGetWin(m.n):null;
      var oTeams=isKO?oBr[m.n]:null;
      var offWin=isKO?(kw[m.n]||(function(){if(!o||!oTeams)return null;var h=+o.h,a=+o.a;if(h>a)return oTeams.h;if(h<a)return oTeams.a;return null;})()):(function(){if(!o)return null;var h=+o.h,a=+o.a,ph=+p.h,pa=+p.a;if(h>a)return m.h;if(h<a)return m.a;return null;})();
      var icon='⬜',mpts=0;
      if(hasOff){
        var ph2=+p.h,pa2=+p.a,oh=+o.h,oa=+o.a;
        if(isKO){
          if(ph2===oh&&pa2===oa&&predWin&&offWin&&predWin===offWin){mpts=cfg.exact;icon='🟢';}
          else if(predWin&&offWin&&predWin===offWin){mpts=cfg.result;icon='🟡';}
          else if(o)icon='🔴';
        }else{
          if(ph2===oh&&pa2===oa){mpts=cfg.exact;icon='🟢';}
          else if(out(ph2-pa2)===out(oh-oa)){mpts=cfg.result;icon='🟡';}
          else icon='🔴';
        }
      }
      var scoreStr=p.h+'-'+p.a;
      var offStr=hasOff?'('+o.h+'-'+o.a+')':'?';
      return '<div class="my-match">'+
        '<span class="match-date">'+(isKO?'P'+m.n:m.d)+'</span>'+
        '<span class="th">'+(isKO?(F(pRes.br[m.n]&&pRes.br[m.n].h||'')+' '+(pRes.br[m.n]&&pRes.br[m.n].h||m.h)):F(m.h)+' '+m.h)+'</span>'+
        '<span class="sbox" style="font-size:12px;gap:6px"><b>'+scoreStr+'</b><span style="color:#aaa">'+offStr+'</span>'+icon+(hasOff?' <span style="color:#2a9d8f;font-weight:800">'+mpts+'p</span>':'')+'</span>'+
        '<span class="ta">'+(isKO?(pRes.br[m.n]&&pRes.br[m.n].a||m.a):m.a+' '+F(m.a))+'</span>'+
      '</div>';
    }).filter(Boolean).join('');
  };
  var grpRows=allMatchRows(MS,false);
  var koRows=[].concat(R32,OCT,QF,SF,TP,FIN).map(function(m){return allMatchRows([m],true);}).join('');
  var predQuals=deriveParticipantQuals(pSc,pKw);
  var phaseDetail=PHASES.map(function(ph){
    var mine=predQuals[ph.k]||[];
    var off=oq[ph.k]||[];
    if(!mine.length)return '';
    var chips=mine.map(function(t){
      var hit=off.indexOf(t)>=0;
      return '<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;border:1.5px solid '+(hit?'#2e7d32':'#ccc')+';border-radius:7px;padding:4px 9px;margin:3px;background:'+(hit?'#e8f5e9':'#fff')+';color:'+(hit?'#1b5e20':'#666')+'">'+F(t)+' '+t+(hit?' ✓':'')+'</span>';
    }).join('');
    return '<div style="margin-bottom:10px"><div class="sect">'+ph.lbl+' · '+(pts.byPhase[ph.k]||0)+' pts</div>'+chips+'</div>';
  }).join('');
  return '<div class="notice">🔒 Pronóstico bloqueado · <strong>'+pts.tot+' pts</strong> · Marcadores: '+pts.sc+' · Clasificados: '+pts.q+'</div>'+
    '<div class="sect">Mis marcadores — Grupos</div>'+
    '<div class="grp-block">'+grpRows+'</div>'+
    (koRows?'<div class="sect" style="margin-top:14px">Mis marcadores — Eliminatorias</div><div class="grp-block">'+koRows+'</div>':'')+
    (phaseDetail?'<div class="sect" style="margin-top:14px">Mis clasificados por fase</div>'+phaseDetail:'');
}

    '<div class="reg-price"><div class="reg-phase">Octavos</div><div class="reg-amount">$10.000</div><div class="reg-pnote">Por cambio de marcador</div></div>'+
    '<div class="reg-price"><div class="reg-phase">Cuartos</div><div class="reg-amount">$15.000</div><div class="reg-pnote">Por cambio de marcador</div></div>'+
    '</div>'+
    '<div class="reg-warn">⚠️ Solo se hará devolución del dinero hasta un día antes de comenzado el primer partido del Mundial FIFA 2026.</div>'+
    '</div>';

  var boteSec='<div class="reg-sec"><div class="reg-hdr"><span class="reg-icon" style="background:#fff8e1;color:#c9a227">🧮</span><div><div class="reg-title">Cálculo del bote total</div><div class="reg-sub">Fórmula oficial para calcular el premio</div></div></div>'+
    '<div class="reg-formula">Bote = (Inscripción × N.º jugadores) + Total cambios<br>Premio final = Bote × 90% &nbsp;(10% de administración)</div>'+
    '<ol class="reg-ol"><li>Se multiplica el valor de inscripción ($60.000) por el número de jugadores inscritos.</li>'+
    '<li>Se suma el total recaudado por cambios de marcadores en todas las etapas.</li>'+
    '<li>Al total se le descuenta el <strong>10% de administración</strong>. El 90% restante es el premio a repartir.</li></ol>'+
    '</div>';

  var premSec='<div class="reg-sec"><div class="reg-hdr"><span class="reg-icon" style="background:#fff8e1;color:#c9a227">🏆</span><div><div class="reg-title">Premiación</div><div class="reg-sub">Distribución del bote entre los 5 primeros puestos</div></div></div>'+
    '<table class="reg-prize-table"><thead><tr><th>Puesto</th><th>%</th>'+(bote>0?'<th>Premio estimado</th>':'')+'</tr></thead><tbody>'+
    puestos.map(function(p,i){return '<tr class="reg-prize-row'+(i===0?' reg-p1':i===1?' reg-p2':i===2?' reg-p3':'')+'">'+
      '<td>'+medals[i]+' <strong>'+p+'</strong></td>'+
      '<td><strong>'+pctLabels[i]+'</strong></td>'+
      (bote>0?'<td style="color:#c9a227;font-weight:700">$'+Math.round(bote*pcts[i]).toLocaleString('es-CO')+'</td>':'')+
      '</tr>';}).join('')+
    '</tbody></table>'+(bote>0?'<div class="reg-note" style="margin-top:10px">💰 Bote total configurado: <strong>$'+bote.toLocaleString('es-CO')+'</strong></div>':'')+
    '</div>';

  var desSec='<div class="reg-sec"><div class="reg-hdr"><span class="reg-icon" style="background:#f3e5f5;color:#7b1fa2">⚖️</span><div><div class="reg-title">Criterios de desempate</div><div class="reg-sub">En caso de igualdad de puntos entre jugadores</div></div></div>'+
    '<ol class="reg-ol"><li><strong>Mayor número de marcadores exactos acertados</strong> durante todo el torneo.</li>'+
    '<li><strong>Acierto al campeón del torneo.</strong> Quien haya acertado al campeón tiene preferencia.</li>'+
    '<li>Si el empate persiste, el premio se distribuye en <strong>partes iguales</strong> entre los jugadores empatados.</li></ol>'+
    '<div class="reg-example"><strong>Ejemplo 1:</strong> Si dos jugadores empatan en el 1.er puesto, se distribuye entre ellos el 75% (50%+25% = 37.5% cada uno).</div>'+
    '<div class="reg-example"><strong>Ejemplo 2:</strong> Si tres jugadores empatan en el 4.º puesto, se distribuye entre ellos el 10% (5%+5% = 3.33% cada uno).</div>'+
    '</div>';

  var reglasSec='<div class="reg-sec"><div class="reg-hdr"><span class="reg-icon" style="background:#fdecea;color:#c0392b">📋</span><div><div class="reg-title">Reglas adicionales</div></div></div>'+
    '<ol class="reg-ol">'+
    '<li>A partir de los 16avos de final se pronostica <strong>la llave de forma independiente</strong>, sin importar cuáles sean los equipos clasificados.</li>'+
    '<li>Los puntos en fase eliminatoria aplican hasta el <strong>resultado al final del tiempo reglamentario y alargue</strong>. No se otorgan puntos por triunfo en penaltis.</li>'+
    '<li>Se tiene un <strong>porcentaje de administración del 10%</strong> sobre el total acumulado del bote.</li>'+
    '<li>Solo se hará <strong>devolución del dinero hasta un día antes</strong> del primer partido del Mundial FIFA 2026.</li>'+
    '<li>Los cambios de marcador tienen un costo que varía según la etapa del torneo.</li>'+
    '</ol></div>';

  return '<div style="padding-bottom:20px">'+ptsSec+bonSec+precSec+boteSec+premSec+desSec+reglasSec+'</div>';
}

// ══ ADMIN PANEL ══
var ADMIN_STABS=[{k:'resultados',l:'Resultados'},{k:'usuarios',l:'Usuarios'},{k:'config',l:'Configuración'},{k:'recuperacion',l:'Recuperaciones'}];
function renderAdminPanel(sc,kw,oq,cfg,std,thirds){
  var tabs=ADMIN_STABS.map(function(t){return '<button class="btn '+(adminSub===t.k?'solid':'')+'" onclick="setAdminSub(\''+t.k+'\')">'+t.l+'</button>';}).join('');
  var body='';
  if(adminSub==='resultados')body=renderAdminResultsMain(sc,kw,std,thirds);
  else if(adminSub==='usuarios')body=renderAdminUsers();
  else if(adminSub==='config')body=renderAdminCfg(cfg);
  else if(adminSub==='recuperacion')body=renderRecovery();
  return '<div class="btns" style="margin-bottom:14px">'+tabs+'</div>'+body;
}
function renderAdminUsers(){
  if(!D.users.length)return'<div class="card"><p class="muted" style="text-align:center;padding:12px">Sin usuarios.</p></div>';
  return '<div class="card" style="padding:0;overflow:hidden"><table class="lb-table"><thead><tr><th>Nombre</th><th>Usuario</th><th>Bloqueado</th><th>Acciones</th></tr></thead><tbody>'+
    D.users.map(function(u){return '<tr><td style="font-weight:700">'+esc(u.name)+'</td><td style="font-family:monospace;font-size:12px">'+esc(u.username)+'</td><td>'+(u.locked?'🔒 Sí':'No')+'</td><td style="display:flex;gap:6px;flex-wrap:wrap">'+
      (u.locked?'<button class="btn gray" style="padding:5px 10px;font-size:12px" onclick="resetUser(\''+u.id+'\')">🔓 Desbloquear</button>':'<button class="btn" style="padding:5px 10px;font-size:12px;border-color:#e65100;color:#e65100" onclick="lockUser(\''+u.id+'\')">🔒 Bloquear</button>')+
      '<button class="btn red" style="padding:5px 10px;font-size:12px" onclick="delUser(\''+u.id+'\')">Eliminar</button></td></tr>';}).join('')+
    '</tbody></table></div>';
}
function renderAdminCfg(cfg){
  return '<div class="card"><div class="card-title">Puntuación</div>'+
    [['exact','Marcador exacto (pts adicionales: 3)'],['result','Solo ganador o empate (pts: 2)'],['r32','16avos (por equipo)'],['r16','Octavos (por equipo)'],['qf','Cuartos (por equipo)'],['sf','Semis (por equipo)'],['tp','3.º y 4.º puesto (por equipo)'],['fin','Final (por equipo)'],['champ','Campeón del mundo']].map(function(x){
      return '<div class="cfg-row"><span class="cfg-lbl">'+x[1]+'</span><input class="field-in cfg-in" data-key="'+x[0]+'" type="number" min="0" value="'+(cfg[x[0]]||0)+'" style="width:70px"> pts</div>';
    }).join('')+
    '<div class="cfg-row" style="margin-top:12px;border-top:1px solid #eee;padding-top:12px"><span class="cfg-lbl">Contraseña administrador</span><input class="field-in" id="cfgPass" type="text" value="'+esc(cfg.adminPass||'Admin2026')+'" style="width:160px"></div>'+
    '<div class="btns"><button class="btn solid" id="btnSaveCfg">💾 Guardar</button><button class="btn" id="btnExport">⬇️ Exportar configurado</button></div>'+
    '<div style="margin-top:20px;border-top:2px dashed #ffcdd2;padding-top:16px">'+
    '<div class="card-title" style="color:#c0392b">⚠️ Zona de peligro</div>'+
    '<p class="muted" style="margin-bottom:10px">Elimina todos los participantes, pronósticos y resultados. La configuración de puntuación se conserva.</p>'+
    '<button class="btn red" id="btnResetAll">🗑️ Eliminar todos los datos (participantes y marcadores)</button>'+
    '</div></div>';
}
function renderRecovery(){
  var reqs=D.recovery||[];
  if(!reqs.length)return'<div class="card"><p class="muted" style="text-align:center;padding:12px">Sin solicitudes.</p></div>';
  return reqs.map(function(r){return '<div class="card"><div class="card-title">'+esc(r.name)+' <span class="muted">@'+esc(r.username)+'</span></div><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><input class="field-in" id="tmp_'+r.uid+'" placeholder="Nueva contraseña temporal" style="flex:1;min-width:140px"><button class="btn solid" onclick="resetPass(\''+r.uid+'\')">Asignar</button><button class="btn gray" onclick="dismissRec(\''+r.uid+'\')">Descartar</button></div></div>';}).join('');
}

// ══ BIND APP ══
function bindApp(sc,kw,oq,cfg){
  var el=function(id){return document.getElementById(id);};
  // Listeners globales para actualización en tiempo real del cuadro
  document.addEventListener('input',function(e){
    var t=e.target;
    if(t.classList.contains('pred-sc')||t.dataset.scoreN){updateLiveTeams();}
  });
  document.addEventListener('change',function(e){
    var t=e.target;
    if(t.classList.contains('pred-kw')){updateLiveTeams();}
  });
  el('btnSaveDraft')&&el('btnSaveDraft').addEventListener('click',function(){savePred(false);});
  el('btnLock')&&el('btnLock').addEventListener('click',function(){savePred(true);});
  el('btnSaveResults')&&el('btnSaveResults').addEventListener('click',saveResults);
  el('btnSaveCfg')&&el('btnSaveCfg').addEventListener('click',saveCfg);
  el('btnResetAll')&&el('btnResetAll').addEventListener('click',resetAllData);
  el('btnExport')&&el('btnExport').addEventListener('click',function(){var c=getCreds();doExportFile(c.binId,c.key);});
}

// ══ ACTIONS ══
function doLogout(){me=null;livePred=null;appTab='pronos';pSubTab='grupos';adminSub='resultados';adminKoSub='grupos';authSub='login';authMsg='';render();}
function setAppTab(t){
  syncInputsToLive();
  appTab=t;
  render();
  // Actualizar puntos en vivo después del render
  setTimeout(updateLiveScoreDisplay,30);
}
function setPSubTab(t){syncInputsToLive();pSubTab=t;render();}
function setAdminSub(t){adminSub=t;adminKoSub='grupos';render();}
function setAdminKoSub(t){adminKoSub=t;render();}

function collectPredScores(){
  var sc={};
  document.querySelectorAll('.pred-sc[data-mid]').forEach(function(inp){
    var id=inp.dataset.mid,s=inp.dataset.side;
    if(!sc[id])sc[id]={h:'',a:''};
    if(inp.value!=='')sc[id][s]=+inp.value;
  });
  return sc;
}
function collectPredKW(){
  var kw={};
  document.querySelectorAll('.pred-kw[data-mn]').forEach(function(sel){
    if(sel.value)kw[+sel.dataset.mn]=sel.value;
  });
  return kw;
}
function savePred(lock){
  if(lock&&!confirm('¿Confirmas BLOQUEAR tu pronóstico definitivamente?\n\nNo podrás editarlo después.'))return;
  syncInputsToLive(); // recoger todos los inputs actuales en livePred
  var mergedSc=Object.assign({},livePred.scores);
  var mergedKw=Object.assign({},livePred.koWinners);
  persist(function(d){
    d.predictions[me.id]={scores:mergedSc,koWinners:mergedKw};
    if(lock)d.users=d.users.map(function(u){return u.id===me.id?Object.assign({},u,{locked:true}):u;});
    return d;
  }).then(function(){if(lock){me=Object.assign({},me,{locked:true});toast('¡Pronóstico bloqueado! 🔒');render();}else{toast('Borrador guardado ✓');}});
}
function saveResults(){
  var sc={};
  document.querySelectorAll('.off-sc[data-mid]').forEach(function(inp){
    var id=inp.dataset.mid,s=inp.dataset.side;
    var numId=isNaN(+id)?id:String(id); // mantener string para consistencia
    if(!sc[numId])sc[numId]={h:'',a:''};
    if(inp.value!=='')sc[numId][s]=+inp.value;
  });
  var kw={};
  document.querySelectorAll('.off-kw[data-mn]').forEach(function(sel){
    if(sel.value)kw[+sel.dataset.mn]=sel.value;
  });
  persist(function(d){
    Object.entries(sc).forEach(function(e){if(e[1].h!==''||e[1].a!=='')d.official.scores[String(e[0])]=e[1];});
    Object.entries(kw).forEach(function(e){d.official.kw[e[0]]=e[1];});
    return d;
  });
}
function saveCfg(){
  var c={};
  document.querySelectorAll('.cfg-in[data-key]').forEach(function(i){c[i.dataset.key]=+i.value||0;});
  c.adminPass=(document.getElementById('cfgPass')&&document.getElementById('cfgPass').value)||'Admin2026';
  persist(function(d){d.config=c;return d;});
}
function resetAllData(){
  if(!confirm('⚠️ ATENCIÓN\n\nEsto eliminará PERMANENTEMENTE:\n- Todos los participantes\n- Todos los pronósticos\n- Todos los resultados oficiales\n\nLa configuración de puntuación se conservará.\n\n¿Confirmas que deseas eliminar todo?'))return;
  if(!confirm('¿Estás completamente seguro? Esta acción NO se puede deshacer.'))return;
  persist(function(d){
    d.users=[];
    d.predictions={};
    d.official={scores:{},kw:{}};
    d.recovery=[];
    return d;
  }).then(function(){
    livePred=null;
    toast('✓ Todos los datos eliminados. La polla está en cero.');
    adminSub='resultados';
    render();
  });
}
function lockUser(id){
  if(!confirm('¿Bloquear el pronóstico de este participante?\nNo podrá hacer más cambios hasta que lo desbloquees.'))return;
  persist(function(d){d.users=d.users.map(function(u){return u.id===id?Object.assign({},u,{locked:true}):u;});return d;})
  .then(function(){toast('✓ Pronóstico bloqueado');render();});
}
function delUser(id){
  if(!confirm('¿Eliminar este usuario y sus pronósticos?'))return;
  persist(function(d){d.users=d.users.filter(function(u){return u.id!==id;});delete d.predictions[id];return d;});
}
function resetUser(id){
  persist(function(d){d.users=d.users.map(function(u){return u.id===id?Object.assign({},u,{locked:false}):u;});return d;})
  .then(function(){toast('✓ Usuario desbloqueado');render();});
}
function resetPass(uid){
  var el=document.getElementById('tmp_'+uid);
  var np=el&&el.value||'';
  if(!np||np.length<3){toast('Mínimo 3 caracteres','err');return;}
  persist(function(d){d.users=d.users.map(function(u){return u.id===uid?Object.assign({},u,{password:np}):u;});d.recovery=(d.recovery||[]).filter(function(r){return r.uid!==uid;});return d;});
}
function dismissRec(uid){persist(function(d){d.recovery=(d.recovery||[]).filter(function(r){return r.uid!==uid;});return d;});}

// ══ INIT ══
(function init(){
  var c=getCreds();
  if(!c.binId||!c.key){
    if(typeof _binId!=='undefined'&&_binId&&typeof _key!=='undefined'&&_key){setCreds(_binId,_key);}
    else{screen='auth';render();return;}
  }
  screen='auth';
  apiLoad().then(function(data){
    if(!data){render();toast('Error de conexión','err');return;}
    D=normalizeData(data);render();
    syncT=setInterval(function(){
      if(document.hidden)return;
      apiLoad().then(function(fresh){
        if(fresh){D=normalizeData(fresh);}
        if(me){var freshMe=D.users.find(function(u){return u.id===me.id;});if(freshMe&&freshMe.locked!==me.locked){me=Object.assign({},me,{locked:freshMe.locked});render();return;}}
      if(me&&(appTab==='tabla'||appTab==='cuadro'))render();
      });
    },30000);
  });
})();

</script>
